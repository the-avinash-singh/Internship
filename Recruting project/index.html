<!doctype html>
<html>

<head>
    <title>login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-700">
    <main class="flex items-center justify-center h-screen">
        <form action="blank.html">
            <div class="bg-none w-96 p-6 rounded shadow-sm">
                <div class="text-gray-100 item-center justify-center text-2xl">Login</div>
            <div class="flex items-center justify-center mb-4">
            </div>
            
            <input class="w-full py-2 bg-gray-700 hover:bg-gray-600 hover:rounded-lg text-gray-500 px-1 border-b-4 border-gray-300 mb-4 shadow-sm outline-none " type="email" placeholder="Email" required=""/>
            <input class="w-full py-2 bg-gray-700 hover:bg-gray-600 hover:rounded-lg text-gray-500 px-1 border-b-4 border-gray-300  mb-4 shadow-sm outline-none" type="password" placeholder="Password" required=""/>
            <input class="mb-4 cursor-pointer" type="checkbox" id="remember"/>
            <label for="remember" class="text-gray-400  cursor-pointer ">Remember Me</label>
            <button type="submit" class="bg-blue-400 w-full mt-5 mb-5 py-2 rounded-lg hover:bg-blue-600 transition-colors">Login</button>
            <div class=" item-center mb-5">
                <span class="text-white">If don't have a account </span><a href="register.html" class="text-blue-500 cursor-pointer">Register here.</a>
            </div>
            <a href="#"  class="text-blue-500 cursor-pointer">Forget password?</a>
        </div>
    </form>
    </main>
    </h1>
</body>

</html>
